<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocks Rush</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url("assets/bg.png") no-repeat center center/cover;
}

/* OVERLAY */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    z-index: 1;
}

/* TITLE */
#title {
    position: relative;
    z-index: 2;
    margin-top: 80px;
    font-size: 50px;
    font-weight: bold;
}

/* BUTTONS */
#menu {
    position: relative;
    z-index: 2;
    margin-top: 40px;
}

button {
    display: block;
    margin: 15px auto;
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    background: gold;
    border: none;
    border-radius: 8px;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* FALLING BLOCKS */
.falling-block {
    position: absolute;
    width: 50px;
    height: 50px;
    background-size: cover;
    image-rendering: pixelated;
    pointer-events: none;
    z-index: 0;
}
</style>
</head>

<body>

<div id="overlay"></div>

<h1 id="title">Blocks Rush</h1>

<div id="menu">
    <button onclick="play()">▶ Play</button>
    <button onclick="settings()">⚙ Settings</button>
    <button disabled>🚧 Coming Soon</button>
</div>

<script>
const blocks = ["tnt","emerald","diamond","grass","gold"];

// 🎮 NAVIGATION
function play(){
    window.location.href = "biomes.html";
}

function settings(){
    let current = localStorage.getItem("music") || "on";
    let newState = current === "on" ? "off" : "on";
    localStorage.setItem("music", newState);
    alert("Music: " + newState);
}

// 🌧️ FALLING BLOCKS
function spawnBlock(){
    let block = document.createElement("div");
    block.className = "falling-block";

    let type = blocks[Math.random()*blocks.length | 0];
    block.style.background = `url(assets/${type}.png) center/cover`;

    let x = Math.random() * window.innerWidth;
    block.style.left = x + "px";
    block.style.top = "-60px";

    document.body.appendChild(block);

    let speed = 2 + Math.random() * 3;
    let pos = -60;

    let fall = setInterval(()=>{
        pos += speed;
        block.style.top = pos + "px";

        if(pos > window.innerHeight){
            clearInterval(fall);
            block.remove();
        }
    }, 16);
}

// spawn continuously
setInterval(spawnBlock, 400);
</script>

</body>
</html>
