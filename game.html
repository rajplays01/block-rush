<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocks Rush</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial;
    color: white;
    padding-top: 20px;
    background-size: cover;
    background-position: center;
}

/* OVERLAY */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: -1;
}

/* UI */
#logo { width: 150px; }
#topbar {
    display: flex;
    gap: 15px;
    margin-bottom: 10px;
}
#targets { color: gold; }

/* BOARD */
#board {
    position: relative;
    width: 520px;
    height: 520px;
}

.block {
    position: absolute;
    width: 60px;
    height: 60px;
    cursor: pointer;
    image-rendering: pixelated;
    border: 2px solid rgba(0,0,0,0.4);
    transition: transform 0.25s cubic-bezier(0.2,1.2,0.3,1), opacity 0.2s;
}

.block:hover {
    transform: scale(1.1);
    z-index: 5;
}

/* POP */
@keyframes pop {
    0% { transform: scale(1); }
    100% { transform: scale(0); opacity: 0; }
}

/* SHAKE */
@keyframes shake {
    0% { transform: translate(0); }
    50% { transform: translate(6px,-6px); }
    100% { transform: translate(0); }
}

/* SCORE POP */
.score-popup {
    position: absolute;
    color: yellow;
    font-weight: bold;
    animation: floatUp 1s forwards;
}
@keyframes floatUp {
    to { transform: translateY(-40px); opacity: 0; }
}

/* TNT */
#tnt {
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
}

/* GAME OVER */
#gameover {
    position: absolute;
    background: rgba(0,0,0,0.9);
    padding: 25px;
    border-radius: 10px;
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div id="overlay"></div>

<img src="assets/logo.png" id="logo">

<div id="topbar">
    <div id="biome"></div>
    <div id="level"></div>
    <div id="timer"></div>
    <div id="targets"></div>
</div>

<div id="board"></div>

<div id="tnt">
    <img src="assets/tnt.gif" width="120">
</div>

<div id="gameover">
    <h2 id="resultText"></h2>
    <p id="starsText"></p>
    <button onclick="goLevels()">Back</button>
</div>

<script>
const board = document.getElementById("board");
const timerDisplay = document.getElementById("timer");
const targetsUI = document.getElementById("targets");

let biome = Number(localStorage.getItem("selectedBiome")) || 1;
let level = Number(localStorage.getItem("selectedLevel")) || 1;

document.getElementById("biome").innerText = "Biome: " + biome;
document.getElementById("level").innerText = "Level: " + level;

// 🎨 BIOME BACKGROUNDS
const biomeBG = {
    1: "assets/bg.png",
    2: "assets/desert.png",
    3: "assets/snow.png",
    4: "assets/nether.png"
};

document.body.style.backgroundImage = `url(${biomeBG[biome] || "assets/bg.png"})`;

const blocks = ["tnt","emerald","diamond","grass","gold"];

let grid = [];
let selectedBlock = null;
let timeLeft = 60;
let gameActive = true;

// 🎯 TARGET GENERATION (scales with level)
let targets = {
    grass: 5 + level*2,
    tnt: 4 + level,
    diamond: Math.floor(level/2)
};

function updateTargetsUI(){
    let t="";
    for(let k in targets){
        if(targets[k]>0) t+=k+": "+targets[k]+" ";
    }
    targetsUI.innerText=t;
}

// CREATE BOARD
function createBoard(){
    board.innerHTML="";
    for(let r=0;r<8;r++){
        grid[r]=[];
        for(let c=0;c<8;c++){
            let type=blocks[Math.random()*5|0];
            grid[r][c]={type};

            let el=document.createElement("div");
            el.className="block";
            el.dataset.row=r;
            el.dataset.col=c;
            el.onclick=()=>handleClick(el);

            board.appendChild(el);
        }
    }
    updateBoard();
    updateTargetsUI();
}

// CLICK
function handleClick(el){
    if(!gameActive) return;

    let r=+el.dataset.row;
    let c=+el.dataset.col;

    if(!selectedBlock){
        selectedBlock=el;
        el.style.outline="3px solid white";
    } else {
        let r1=+selectedBlock.dataset.row;
        let c1=+selectedBlock.dataset.col;

        if(Math.abs(r1-r)+Math.abs(c1-c)===1){
            swapBlocks(r1,c1,r,c);
        }

        selectedBlock.style.outline="none";
        selectedBlock=null;
    }
}

// SWAP
function swapBlocks(r1,c1,r2,c2){
    [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
    updateBoard();

    setTimeout(()=>{
        processMatches();
    },200);
}

// MATCH
function findMatches(){
    let m=[];
    for(let r=0;r<8;r++){
        for(let c=0;c<6;c++){
            let t=grid[r][c].type;
            if(t && grid[r][c+1].type===t && grid[r][c+2].type===t){
                m.push([[r,c],[r,c+1],[r,c+2]]);
            }
        }
    }
    return m;
}

// PROCESS
function processMatches(){
    let matches=findMatches();
    if(!matches.length) return;

    matches.forEach(group=>{
        group.forEach(([r,c])=>{
            let cell=grid[r][c];
            if(!cell) return;

            let el=document.querySelector(`.block[data-row="${r}"][data-col="${c}"]`);
            if(el){
                el.style.animation="pop 0.3s forwards";
                let rect=el.getBoundingClientRect();
                showScore(rect.left,rect.top,10);
            }

            if(targets[cell.type]>0){
                targets[cell.type]--;
            }

            grid[r][c]=null;
        });
    });

    updateTargetsUI();

    if(checkWin()){
        handleWin();
        return;
    }

    setTimeout(()=>{
        applyGravity();
        fillEmpty();
        updateBoard();
        setTimeout(processMatches,200);
    },300);
}

// FILL EMPTY (FIX)
function fillEmpty(){
    for(let r=0;r<8;r++){
        for(let c=0;c<8;c++){
            if(!grid[r][c]){
                grid[r][c]={type:blocks[Math.random()*5|0]};
            }
        }
    }
}

// GRAVITY
function applyGravity(){
    for(let c=0;c<8;c++){
        let empty=7;
        for(let r=7;r>=0;r--){
            if(grid[r][c]){
                grid[empty][c]=grid[r][c];
                if(empty!==r) grid[r][c]=null;
                empty--;
            }
        }
    }
}

// UPDATE
function updateBoard(){
    document.querySelectorAll(".block").forEach(b=>{
        let r=b.dataset.row;
        let c=b.dataset.col;
        let cell=grid[r][c];

        b.style.opacity=cell?1:0;

        if(cell){
            b.style.background=`url(assets/${cell.type}.png) center/cover`;
        }

        b.style.transform=`translate(${c*65}px,${r*65}px)`;
    });
}

// WIN
function handleWin(){
    gameActive=false;

    let stars = timeLeft>40?3:timeLeft>20?2:1;

    document.getElementById("resultText").innerText="Level Complete 🎉";
    document.getElementById("starsText").innerText="⭐".repeat(stars);

    // SAVE ⭐
    localStorage.setItem(`biome${biome}_level${level}`, stars);

    // UNLOCK NEXT LEVEL
    let unlocked = Number(localStorage.getItem("biome"+biome+"_unlocked")) || 1;
    if(level+1 > unlocked && level < 20){
        localStorage.setItem("biome"+biome+"_unlocked", level+1);
    }

    // UNLOCK NEXT BIOME
    if(level === 20){
        let ub = Number(localStorage.getItem("unlockedBiome")) || 1;
        if(biome >= ub){
            localStorage.setItem("unlockedBiome", biome+1);
        }
    }

    document.getElementById("gameover").style.display="block";
}

// CHECK WIN
function checkWin(){
    return Object.values(targets).every(v=>v<=0);
}

// SCORE POP
function showScore(x,y,val){
    let el=document.createElement("div");
    el.className="score-popup";
    el.innerText="+"+val;
    el.style.left=x+"px";
    el.style.top=y+"px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

// TNT LOSE
function startTNT(){
    let tnt=document.getElementById("tnt");
    tnt.style.display="block";
    let pos=-120;

    let fall=setInterval(()=>{
        pos+=10;
        tnt.style.top=pos+"px";

        if(pos>300){
            clearInterval(fall);
            document.body.style.animation="shake 0.3s";
            setTimeout(()=>{
                document.getElementById("resultText").innerText="Game Over 💣";
                document.getElementById("gameover").style.display="block";
            },500);
        }
    },20);
}

// TIMER
function startTimer(){
    setInterval(()=>{
        if(!gameActive) return;

        timeLeft--;
        timerDisplay.innerText="Time: "+timeLeft;

        if(timeLeft<=0){
            gameActive=false;
            startTNT();
        }
    },1000);
}

// BACK
function goLevels(){
    window.location.href="levels.html";
}

// START
createBoard();
startTimer();
</script>

</body>
</html>
