<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocks Rush</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial;
    color: white;
    padding-top: 20px;
    background: url("assets/bg.png") no-repeat center center/cover;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

#topbar {
    display: flex;
    gap: 20px;
    margin-bottom: 10px;
}

#board {
    position: relative;
    width: 520px;
    height: 520px;
}

.block {
    position: absolute;
    width: 60px;
    height: 60px;
    cursor: pointer;
    image-rendering: pixelated;
    border: 2px solid rgba(0,0,0,0.4);
    transition: transform 0.25s ease, opacity 0.2s;
}

.block:hover {
    transform: scale(1.1);
}

@keyframes pop {
    to {
        transform: scale(0);
        opacity: 0;
    }
}

#gameover {
    position: absolute;
    background: rgba(0,0,0,0.9);
    padding: 20px;
    border-radius: 10px;
    display: none;
}
</style>
</head>

<body>

<div id="overlay"></div>

<h2 id="levelInfo"></h2>

<div id="topbar">
    <div id="timer"></div>
</div>

<div id="board"></div>

<div id="gameover">
    <h2>Game Over</h2>
    <button onclick="location.href='levels.html'">Back</button>
</div>

<script>
const board = document.getElementById("board");
const timerDisplay = document.getElementById("timer");

const blocks = ["tnt","emerald","diamond","grass","gold"];

let grid = [];
let selectedBlock = null;
let timeLeft = 60;
let gameActive = true;

let biome = Number(localStorage.getItem("selectedBiome")) || 1;
let level = Number(localStorage.getItem("selectedLevel")) || 1;

document.getElementById("levelInfo").innerText = "Biome " + biome + " - Level " + level;

// CREATE BOARD
function createBoard(){
    board.innerHTML="";

    for(let r=0;r<8;r++){
        grid[r]=[];

        for(let c=0;c<8;c++){
            let type = blocks[Math.random()*blocks.length|0];

            grid[r][c]={type};

            let el=document.createElement("div");
            el.className="block";
            el.dataset.row=r;
            el.dataset.col=c;
            el.onclick=()=>handleClick(el);

            board.appendChild(el);
        }
    }

    updateBoard();
}

// CLICK
function handleClick(el){
    if(!gameActive) return;

    let r=+el.dataset.row;
    let c=+el.dataset.col;

    if(!selectedBlock){
        selectedBlock=el;
        el.style.outline="3px solid white";
    } else {
        let r1=+selectedBlock.dataset.row;
        let c1=+selectedBlock.dataset.col;

        if(Math.abs(r1-r)+Math.abs(c1-c)===1){
            swap(r1,c1,r,c);
        }

        selectedBlock.style.outline="none";
        selectedBlock=null;
    }
}

// SWAP
function swap(r1,c1,r2,c2){
    [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
    updateBoard();

    setTimeout(()=>{
        let m = findMatches();
        if(m.length){
            processMatches();
        } else {
            // swap back
            [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
            updateBoard();
        }
    },200);
}

// FIND MATCHES
function findMatches(){
    let m=[];

    for(let r=0;r<8;r++){
        for(let c=0;c<6;c++){
            let t=grid[r][c]?.type;
            if(t && grid[r][c+1]?.type===t && grid[r][c+2]?.type===t){
                m.push([[r,c],[r,c+1],[r,c+2]]);
            }
        }
    }

    for(let c=0;c<8;c++){
        for(let r=0;r<6;r++){
            let t=grid[r][c]?.type;
            if(t && grid[r+1][c]?.type===t && grid[r+2][c]?.type===t){
                m.push([[r,c],[r+1,c],[r+2,c]]);
            }
        }
    }

    return m;
}

// PROCESS MATCHES
function processMatches(){
    let matches = findMatches();
    if(!matches.length) return;

    matches.forEach(group=>{
        group.forEach(([r,c])=>{
            let el = document.querySelector(`.block[data-row="${r}"][data-col="${c}"]`);
            if(el) el.style.animation="pop 0.3s forwards";

            grid[r][c]=null;
        });
    });

    setTimeout(()=>{
        applyGravity();
        updateBoard();
        setTimeout(processMatches,200);
    },300);
}

// GRAVITY + NEW BLOCKS
function applyGravity(){
    for(let c=0;c<8;c++){

        let column=[];

        for(let r=0;r<8;r++){
            if(grid[r][c]) column.push(grid[r][c]);
        }

        for(let r=7;r>=0;r--){
            grid[r][c] = column.pop() || {
                type: blocks[Math.random()*blocks.length|0],
                isNew: true
            };
        }
    }
}

// UPDATE BOARD
function updateBoard(){
    document.querySelectorAll(".block").forEach(b=>{
        let r=b.dataset.row;
        let c=b.dataset.col;
        let cell=grid[r][c];

        if(!cell){
            b.style.opacity=0;
            return;
        }

        b.style.opacity=1;
        b.style.background=`url(assets/${cell.type}.png) center/cover`;

        // NEW BLOCK FALL ANIMATION
        if(cell.isNew){
            b.style.transform=`translate(${c*65}px, -80px)`;

            setTimeout(()=>{
                b.style.transform=`translate(${c*65}px, ${r*65}px)`;
            },10);

            delete cell.isNew;
        } else {
            b.style.transform=`translate(${c*65}px, ${r*65}px)`;
        }
    });
}

// TIMER
function startTimer(){
    setInterval(()=>{
        if(!gameActive) return;

        timeLeft--;
        timerDisplay.innerText="Time: "+timeLeft;

        if(timeLeft<=0){
            gameActive=false;
            document.getElementById("gameover").style.display="block";
        }
    },1000);
}

// START
createBoard();
startTimer();
</script>

</body>
</html>
