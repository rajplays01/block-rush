<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocks Rush</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url("assets/bg.png") no-repeat center center/cover;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

#topbar {
    margin-top: 10px;
}

#board {
    position: relative;
    width: 520px;
    height: 520px;
    margin: 20px auto;
}

.block {
    position: absolute;
    width: 60px;
    height: 60px;
    image-rendering: pixelated;
    border: 2px solid rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.25s;
}

.block:hover {
    transform: scale(1.1);
}

/* NEXT BUTTON */
#nextBtn {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    padding: 15px 25px;
    font-size: 18px;
    background: green;
    color: white;
    border: none;
    display: none;
    cursor: pointer;
}

/* GAME OVER */
#gameover {
    display: none;
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: black;
    padding: 20px;
}
</style>
</head>

<body>

<div id="overlay"></div>

<h2 id="levelInfo"></h2>

<div id="topbar">
    <div id="goals"></div>
    <div id="timer">Time: 60</div>
</div>

<div id="board"></div>

<button id="nextBtn" onclick="nextLevel()">NEXT ➡️</button>

<div id="gameover">
    <h2>Game Over</h2>
    <button onclick="location.reload()">Restart</button>
</div>

<script>
const board = document.getElementById("board");

const blocks = ["tnt","emerald","diamond","grass","gold"];

let grid = [];
let selectedBlock = null;

let timeLeft = 60;
let gameActive = true;

let level = 1;

// 🎯 GOALS
let goalTypes = [];
let goalProgress = {};
let goalTarget = {};

// 🎵 MUSIC
const music = new Audio("assets/bg-music.mp4");
let started = false;

document.addEventListener("click", ()=>{
    if(!started){
        music.currentTime = 63;
        music.volume = 0.3;
        music.play();
        started = true;
    }
});

music.addEventListener("timeupdate", ()=>{
    if(music.currentTime >= music.duration - 0.2){
        music.currentTime = 63;
        music.play();
    }
});

// UPDATE LEVEL TEXT
function updateLevelText(){
    document.getElementById("levelInfo").innerText = "Level " + level;
}

// 🎲 RANDOM GOALS EVERY ROUND
function generateGoals(){
    goalTypes = [];
    goalProgress = {};
    goalTarget = {};

    let types = [...blocks].sort(()=>Math.random()-0.5).slice(0,2);

    types.forEach(t=>{
        goalTypes.push(t);
        goalTarget[t] = 6 + Math.floor(Math.random()*6);
        goalProgress[t] = 0;
    });

    updateGoalUI();
}

// UPDATE UI
function updateGoalUI(){
    let text = "";

    goalTypes.forEach(t=>{
        text += `${t}: ${goalProgress[t]}/${goalTarget[t]} &nbsp;&nbsp;`;
    });

    document.getElementById("goals").innerHTML = text;
}

// CREATE BOARD
function createBoard(){
    board.innerHTML="";

    for(let r=0;r<8;r++){
        grid[r]=[];

        for(let c=0;c<8;c++){
            let type;

            do {
                type = blocks[Math.random()*blocks.length|0];
            } while (
                (c>=2 && grid[r][c-1]?.type===type && grid[r][c-2]?.type===type) ||
                (r>=2 && grid[r-1][c]?.type===type && grid[r-2][c]?.type===type)
            );

            grid[r][c]={type};

            let el=document.createElement("div");
            el.className="block";
            el.dataset.row=r;
            el.dataset.col=c;
            el.onclick=()=>handleClick(el);

            board.appendChild(el);
        }
    }

    updateBoard();
}

// CLICK
function handleClick(el){
    if(!gameActive) return;

    let r=+el.dataset.row;
    let c=+el.dataset.col;

    if(!selectedBlock){
        selectedBlock=el;
        el.style.outline="3px solid white";
    } else {
        let r1=+selectedBlock.dataset.row;
        let c1=+selectedBlock.dataset.col;

        if(Math.abs(r1-r)+Math.abs(c1-c)===1){
            swap(r1,c1,r,c);
        }

        selectedBlock.style.outline="none";
        selectedBlock=null;
    }
}

// SWAP
function swap(r1,c1,r2,c2){
    [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
    updateBoard();

    setTimeout(()=>{
        let m=findMatches();
        if(m.length){
            processMatches();
        } else {
            [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
            updateBoard();
        }
    },200);
}

// FIND MATCHES
function findMatches(){
    let matches=[];

    for(let r=0;r<8;r++){
        for(let c=0;c<6;c++){
            let t=grid[r][c]?.type;
            if(t && grid[r][c+1]?.type===t && grid[r][c+2]?.type===t){
                matches.push([[r,c],[r,c+1],[r,c+2]]);
            }
        }
    }

    for(let c=0;c<8;c++){
        for(let r=0;r<6;r++){
            let t=grid[r][c]?.type;
            if(t && grid[r+1][c]?.type===t && grid[r+2][c]?.type===t){
                matches.push([[r,c],[r+1,c],[r+2,c]]);
            }
        }
    }

    return matches;
}

// PROCESS MATCHES
function processMatches(){
    let matches = findMatches();
    if(!matches.length) return;

    let unique = new Set();

    matches.forEach(group=>{
        group.forEach(([r,c])=>{
            unique.add(r+"-"+c);
        });
    });

    unique.forEach(key=>{
        let [r,c] = key.split("-").map(Number);
        let type = grid[r][c]?.type;

        if(goalProgress[type] !== undefined){
            goalProgress[type]++;
        }

        grid[r][c] = null;
    });

    updateGoalUI();

    // 🎉 WIN
    let completed = goalTypes.every(t => goalProgress[t] >= goalTarget[t]);

    if(completed){
        gameActive = false;
        document.getElementById("nextBtn").style.display = "block";
        return;
    }

    setTimeout(()=>{
        applyGravity();
        updateBoard();

        setTimeout(processMatches,200);
    },200);
}

// GRAVITY
function applyGravity(){
    for(let c=0;c<8;c++){
        let col=[];

        for(let r=0;r<8;r++){
            if(grid[r][c]) col.push(grid[r][c]);
        }

        for(let r=7;r>=0;r--){
            grid[r][c] = col.pop() || {
                type: blocks[Math.random()*blocks.length|0],
                new:true
            };
        }
    }
}

// UPDATE BOARD
function updateBoard(){
    document.querySelectorAll(".block").forEach(b=>{
        let r=b.dataset.row;
        let c=b.dataset.col;
        let cell=grid[r][c];

        if(!cell){
            b.style.opacity=0;
            return;
        }

        b.style.opacity=1;
        b.style.background=`url(assets/${cell.type}.png) center/cover`;

        if(cell.new){
            b.style.transform=`translate(${c*65}px,-80px)`;
            setTimeout(()=>{
                b.style.transform=`translate(${c*65}px,${r*65}px)`;
            },10);
            delete cell.new;
        } else {
            b.style.transform=`translate(${c*65}px,${r*65}px)`;
        }
    });
}

// NEXT LEVEL
function nextLevel(){
    level++;
    timeLeft = 60;
    gameActive = true;

    document.getElementById("nextBtn").style.display = "none";

    createBoard();
    generateGoals();
    updateLevelText();
}

// TIMER
setInterval(()=>{
    if(!gameActive) return;

    timeLeft--;
    document.getElementById("timer").innerText="Time: "+timeLeft;

    if(timeLeft<=0){
        gameActive=false;
        document.getElementById("gameover").style.display="block";
    }
},1000);

// START
createBoard();
generateGoals();
updateLevelText();
</script>

</body>
</html>
