<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Levels - Blocks Rush</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url("assets/bg.png") no-repeat center center/cover;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);
    z-index: -1;
}

h1 {
    margin-top: 20px;
}

/* GRID */
#levelGrid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    width: 80%;
    margin: 30px auto;
}

/* LEVEL CARD */
.level {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.level:hover {
    transform: scale(1.05);
    border: 2px solid gold;
}

/* LOCKED */
.locked {
    background: rgba(0,0,0,0.8);
    opacity: 0.6;
    cursor: not-allowed;
}

.locked:hover {
    transform: none;
    border: none;
}

/* STARS */
.stars {
    color: gold;
    margin-top: 5px;
}

/* BACK */
#backBtn {
    margin-top: 10px;
    padding: 8px 15px;
    cursor: pointer;
    background: gold;
    border: none;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="overlay"></div>

<h1 id="title">Levels</h1>

<button id="backBtn" onclick="goBiomes()">⬅ Back</button>

<div id="levelGrid"></div>

<script>
const grid = document.getElementById("levelGrid");

// 🌍 CURRENT BIOME
let biome = Number(localStorage.getItem("selectedBiome")) || 1;
document.getElementById("title").innerText = "Biome " + biome;

// 🔓 UNLOCKED LEVEL (PER BIOME)
let unlockedLevel = Number(localStorage.getItem("biome"+biome+"_unlocked")) || 1;

// CREATE LEVELS
for(let i=1;i<=20;i++){
    let div = document.createElement("div");
    div.className = "level";

    // ⭐ STARS
    let stars = Number(localStorage.getItem(`biome${biome}_level${i}`)) || 0;
    let starText = "⭐".repeat(stars);

    div.innerHTML = `
        <h3>Level ${i}</h3>
        <div class="stars">${starText}</div>
    `;

    // 🔒 LOCK SYSTEM
    if(i > unlockedLevel){
        div.classList.add("locked");
        div.innerHTML += "<p>🔒 Locked</p>";
    } else {
        div.onclick = () => startLevel(i);
    }

    grid.appendChild(div);
}

// ▶ START LEVEL
function startLevel(level){
    localStorage.setItem("selectedLevel", level);
    window.location.href = "game.html";
}

// 🔙 BACK
function goBiomes(){
    window.location.href = "biomes.html";
}
</script>

</body>
</html>
