<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Level - Blocks Rush</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("assets/bg.png") no-repeat center center/cover;
}

/* DARK OVERLAY */
#overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* CONTAINER */
#container {
    position: relative;
    text-align: center;
    z-index: 2;
}

/* TITLE */
h1 {
    color: white;
    margin-bottom: 20px;
}

/* LEVEL GRID */
#levels {
    display: grid;
    grid-template-columns: repeat(3, 120px);
    gap: 20px;
    justify-content: center;
}

/* LEVEL BOX */
.level {
    text-align: center;
}

/* BUTTON */
.level-btn {
    padding: 20px;
    font-size: 18px;
    color: white;
    background: linear-gradient(#5c8a3a, #3d5c25);
    border: 3px solid #2a3d1a;
    cursor: pointer;
    transition: 0.2s;
}

.level-btn:hover {
    transform: scale(1.05);
}

/* LOCKED */
.locked {
    background: gray;
    cursor: not-allowed;
    opacity: 0.6;
}

/* STARS */
.stars {
    margin-top: 5px;
    font-size: 18px;
    color: gold;
}

/* BACK BUTTON */
#back {
    margin-top: 20px;
    padding: 10px 20px;
    background: #444;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="overlay"></div>

<div id="container">
    <h1>Select Level</h1>

    <div id="levels"></div>

    <button id="back" onclick="goBack()">⬅ Back</button>
</div>

<script>

// 🎯 TOTAL LEVELS
const TOTAL_LEVELS = 6;

// 🔓 GET UNLOCKED LEVEL
let unlockedLevel = localStorage.getItem("unlockedLevel") || 1;

// 🎮 CREATE LEVEL BUTTONS
function createLevels(){
    const levelsDiv = document.getElementById("levels");

    for(let i=1;i<=TOTAL_LEVELS;i++){

        let wrapper = document.createElement("div");
        wrapper.classList.add("level");

        let btn = document.createElement("button");
        btn.innerText = i;

        // LOCK SYSTEM
        if(i > unlockedLevel){
            btn.classList.add("level-btn","locked");
            btn.innerText = i + " 🔒";
        } else {
            btn.classList.add("level-btn");
            btn.onclick = () => startLevel(i);
        }

        // ⭐ STARS
        let starsDiv = document.createElement("div");
        starsDiv.classList.add("stars");

        let stars = localStorage.getItem("level"+i) || 0;
        starsDiv.innerText = "⭐".repeat(stars);

        wrapper.appendChild(btn);
        wrapper.appendChild(starsDiv);

        levelsDiv.appendChild(wrapper);
    }
}

// 🎮 START LEVEL
function startLevel(level){
    localStorage.setItem("selectedLevel", level);
    window.location.href = "game.html";
}

// 🔙 BACK
function goBack(){
    window.location.href = "index.html";
}

// INIT
createLevels();

</script>

</body>
</html>
